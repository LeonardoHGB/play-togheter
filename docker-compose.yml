services:
  listen-together-server:
    build:
      context: ./server
    container_name: listen-together-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      SERVER_NAME: Listen Together Local
      ALLOWED_ORIGINS: "*"
      MAX_ROOMS: 500
      MAX_MEMBERS_PER_ROOM: 30
    ports:
      - "3333:3333"
