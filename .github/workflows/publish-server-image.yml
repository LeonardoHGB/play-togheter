name: Publicar servidor no GHCR

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - ".github/workflows/publish-server-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/listen-together-server:latest
            ghcr.io/${{ github.repository_owner }}/listen-together-server:${{ github.sha }}
